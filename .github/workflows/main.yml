name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-go:
    name: Build Bifrost (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: services/bifrost/go.sum

      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install dependencies
        working-directory: services/bifrost
        run: go mod download

      - name: Lint
        working-directory: services/bifrost
        run: go vet ./...

      - name: Build
        working-directory: services/bifrost
        run: go build ./...

  backend-rust:
    name: Build & Lint Orchestrator (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Lint
        working-directory: services/orchestrator
        run: cargo clippy -- -D warnings

      - name: Build
        working-directory: services/orchestrator
        run: cargo build --verbose

  frontend:
    name: Build & Lint UI (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Lint
        working-directory: ui
        run: npm run lint

      - name: Build
        working-directory: ui
        run: npm run build

  e2e-auth:
    name: "E2E: Auth & Identity"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install UI Dependencies
        working-directory: ui
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ui
        run: npx playwright install --with-deps
      - name: Run Auth Tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nox?sslmode=disable
        run: |
          psql "$DATABASE_URL" -f infra/db/schema.sql
          cd services/bifrost && go run cmd/gateway/main.go &
          cd ui && npx wait-on tcp:8080 && npx playwright test e2e/auth_regression.spec.ts e2e/dashboard_layout.spec.ts --workers=1

  e2e-messaging:
    name: "E2E: Messaging & Threads"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install UI Dependencies
        working-directory: ui
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ui
        run: npx playwright install --with-deps
      - name: Run Messaging Tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nox?sslmode=disable
        run: |
          psql "$DATABASE_URL" -f infra/db/schema.sql
          cd services/bifrost && go run cmd/seed/main.go && go run cmd/gateway/main.go &
          cd ui && npx wait-on tcp:8080 && npx playwright test e2e/messaging_regression.spec.ts e2e/message_edits.spec.ts e2e/thread_regression.spec.ts --workers=1

  e2e-realtime:
    name: "E2E: Real-time Presence & Reactions"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install UI Dependencies
        working-directory: ui
        run: npm ci
      - name: Install Playwright Browsers
        working-directory: ui
        run: npx playwright install --with-deps
      - name: Run Real-time Tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nox?sslmode=disable
        run: |
          psql "$DATABASE_URL" -f infra/db/schema.sql
          cd services/bifrost && go run cmd/seed/main.go && go run cmd/gateway/main.go &
          cd ui && npx wait-on tcp:8080 && npx playwright test e2e/presence.spec.ts e2e/reactions.spec.ts --workers=1
